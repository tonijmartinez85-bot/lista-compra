<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lista de la Compra</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0A0E17;
  --s1:#111827;
  --s2:#1A2235;
  --s3:#222D42;
  --border:#2A3550;
  --accent:#4ADE80;
  --accent2:#86EFAC;
  --adim:#0D2B1A;
  --text:#F0F4FF;
  --t2:#8892AA;
  --t3:#4A5568;
  --amber:#FCD34D;
  --blue:#60A5FA;
  --red:#F87171;
  --r:14px;
  --rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#0A0E17,#111827);border-bottom:1px solid var(--border);padding:0 1rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hdr h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.btn-export{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-export:active{background:var(--s3);}

/* ── Summary ── */
.summary{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 1rem;display:flex;gap:1rem;overflow-x:auto;}
.sum-item{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;}
.sum-val{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--accent);}
.sum-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}
.sum-div{width:1px;height:28px;background:var(--border);flex-shrink:0;align-self:center;}

/* ── Days tabs ── */
.days{display:flex;background:var(--s1);border-bottom:1px solid var(--border);overflow-x:auto;}
.day-tab{flex:1;min-width:80px;padding:11px 8px;font-size:12px;font-weight:600;color:var(--t2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s;}
.day-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:12px;}

/* ── Meal card ── */
.meal-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.meal-hdr{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.meal-hdr-left{display:flex;align-items:center;gap:8px;}
.meal-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.meal-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text);}
.meal-total{font-size:10px;font-weight:600;color:var(--amber);background:rgba(252,211,77,.1);padding:2px 7px;border-radius:8px;}

/* ── Products ── */
.products{padding:6px;}
.product{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--rsm);border:1px solid transparent;margin-bottom:3px;position:relative;transition:border-color .1s;}
.product:hover{border-color:var(--border);}
.product.bought{opacity:.4;}
.prod-img{width:34px;height:34px;border-radius:6px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;flex-shrink:0;}
.prod-img img{width:100%;height:100%;object-fit:cover;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-meta{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
.tag{font-size:9px;padding:1px 5px;border-radius:5px;}
.tag-qty{color:var(--blue);background:rgba(96,165,250,.1);}
.tag-brand{color:var(--t2);background:var(--s2);}
.tag-price{color:var(--amber);background:rgba(252,211,77,.1);font-weight:600;}
.tag-market{color:var(--t3);background:var(--s2);}
.prod-actions{display:flex;gap:3px;flex-shrink:0;}
.bico{width:24px;height:24px;border-radius:5px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:13px;transition:background .1s;}
.bico:hover{background:var(--s2);}
.bico.check{color:var(--accent);}
.bico.del{color:var(--red);}
.bought-line{position:absolute;left:42px;right:30px;top:50%;height:1px;background:var(--t3);pointer-events:none;}

/* ── Add btn ── */
.btn-add{width:100%;padding:7px;border:1px dashed var(--border);border-radius:var(--rsm);background:transparent;color:var(--t3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:2px;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-add:hover,.btn-add:active{border-color:var(--accent);color:var(--accent);background:var(--adim);}

/* ── Modal ── */
.modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);backdrop-filter:blur(3px);align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
@media(min-width:500px){.modal-bg{align-items:center;}}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:1.25rem;width:100%;max-width:420px;position:relative;z-index:1;max-height:90vh;overflow-y:auto;}
@media(min-width:500px){.modal{border-radius:var(--r);}}
.modal-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:1rem;color:var(--text);}

/* Search */
.search-wrap{position:relative;margin-bottom:10px;}
.search-input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 12px 10px 36px;font-size:13px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--t3);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none;}
.search-results{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:10px;max-height:180px;overflow-y:auto;display:none;}
.search-results.show{display:block;}
.sres-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .1s;}
.sres-item:hover,.sres-item:active{background:var(--s3);}
.sres-emoji{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.sres-name{font-size:12px;color:var(--text);font-weight:500;}
.sres-cat{font-size:10px;color:var(--t3);}

/* Form */
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.frow.full{grid-template-columns:1fr;}
.flbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.finp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px 10px;font-size:13px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;}
.finp:focus{border-color:var(--accent);}
.finp::placeholder{color:var(--t3);}

/* Price results */
.price-area{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:8px;margin-bottom:8px;}
.price-area-title{font-size:10px;color:var(--t2);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.price-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;}
.price-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;background:var(--s1);border:1px solid var(--border);cursor:pointer;transition:border-color .1s;}
.price-item:hover,.price-item.sel{border-color:var(--accent);}
.price-item.sel{background:var(--adim);}
.pi-left{font-size:11px;font-weight:500;color:var(--text);}
.pi-sub{font-size:9px;color:var(--t3);}
.pi-right{display:flex;align-items:center;gap:6px;}
.pi-price{font-size:12px;font-weight:700;color:var(--amber);}
.pi-link{color:var(--t3);display:flex;align-items:center;font-size:11px;}

/* Photo */
.photo-area{width:100%;height:70px;border:1px dashed var(--border);border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--s2);overflow:hidden;position:relative;transition:border-color .15s;}
.photo-area:hover{border-color:var(--accent);}
.photo-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.photo-hint{font-size:11px;color:var(--t3);}

/* Buttons */
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-btns button{flex:1;padding:11px;border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--s2);color:var(--t2);font-family:'DM Sans',sans-serif;}
.modal-btns button.ok{background:var(--accent);color:#0A0E17;border-color:var(--accent);}
.btn-free-seat{width:100%;margin-top:8px;padding:8px;border-radius:var(--rsm);border:1px solid rgba(248,113,113,.3);background:rgba(248,113,113,.08);color:var(--red);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* Loading dots */
.dots span{animation:blink 1s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

@media(max-width:400px){.grid{grid-template-columns:1fr;padding:8px;gap:8px;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🛒</div>
    <h1>Lista de la Compra</h1>
  </div>
  <div class="hdr-right">
    <button class="btn-export" onclick="exportList()">📋 Exportar</button>
  </div>
</div>

<div class="summary" id="summary"></div>

<div class="days" id="days"></div>

<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="modal-bg" id="mbg">
  <div style="position:absolute;inset:0;" onclick="closeModal()"></div>
  <div class="modal">
    <div class="modal-title" id="mtitle">Añadir producto</div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-inp" placeholder="Busca un producto…" autocomplete="off" oninput="onSearch(this.value)"/>
    </div>
    <div class="search-results" id="search-res"></div>

    <div class="frow">
      <div>
        <div class="flbl">Cantidad</div>
        <input class="finp" id="f-qty" placeholder="Ej: 2 litros"/>
      </div>
      <div>
        <div class="flbl">Marca</div>
        <input class="finp" id="f-brand" placeholder="Ej: Hacendado"/>
      </div>
    </div>

    <div class="price-area">
      <div class="price-area-title">💰 Precio por supermercado</div>
      <div class="price-list" id="price-list"><div style="font-size:11px;color:var(--t3);padding:4px;">Busca un producto para ver precios</div></div>
    </div>

    <div class="frow">
      <div>
        <div class="flbl">Precio (€)</div>
        <input class="finp" id="f-price" placeholder="0.00" type="number" step="0.01"/>
      </div>
      <div>
        <div class="flbl">Supermercado</div>
        <input class="finp" id="f-market" placeholder="Mercadona…"/>
      </div>
    </div>

    <div class="frow full">
      <div>
        <div class="flbl">Foto (opcional)</div>
        <div class="photo-area" id="photo-area" onclick="document.getElementById('finp-photo').click()">
          <span style="font-size:20px;" id="photo-emoji">📷</span>
          <span class="photo-hint">Toca para añadir</span>
        </div>
        <input type="file" id="finp-photo" accept="image/*" style="display:none" onchange="onPhoto(event)"/>
      </div>
    </div>

    <div class="modal-btns">
      <button onclick="closeModal()">Cancelar</button>
      <button class="ok" onclick="saveProduct()">Añadir ✓</button>
    </div>
    <button class="btn-free-seat" id="btn-free" onclick="deleteCurrentProduct()" style="display:none;">🗑 Eliminar producto</button>
  </div>
</div>

// ── Search ────────────────────────────────────────────────────────
function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}

function searchDB(q){
  if(!q||q.length<2)return[];
  const nq=norm(q);
  const results=[];
  DB.forEach(p=>{
    const nn=norm(p.n);
    if(nn.startsWith(nq))results.unshift(p);
    else if(nn.includes(nq))results.push(p);
  });
  return results.slice(0,8);
}

function onSearch(val){
  const res=searchDB(val);
  const el=document.getElementById('search-res');
  if(!val||val.length<2||!res.length){el.classList.remove('show');return;}
  el.innerHTML=res.map(p=>`
    <div class="sres-item" onclick="selectProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})">
      <span class="sres-emoji">${p.e}</span>
      <div>
        <div class="sres-name">${p.n}</div>
        <div class="sres-cat">${p.c}</div>
      </div>
    </div>`).join('');
  el.classList.add('show');
}

function selectProduct(p){
  selectedProduct=p;
  document.getElementById('search-inp').value=p.n;
  document.getElementById('search-res').classList.remove('show');
  document.getElementById('photo-emoji').textContent=p.e;
  renderPrices(p);
}

function renderPrices(p){
  const el=document.getElementById('price-list');
  const name=p.n;
  el.innerHTML=p.p.map((r,i)=>{
    const url=MARKET_URLS[r.m]?MARKET_URLS[r.m](name):'#';
    return `<div class="price-item" id="pi-${i}" onclick="selectPrice(${i},'${esc(r.m)}','${esc(r.b)}','${r.p}')">
      <div>
        <div class="pi-left">${esc(r.m)} · <span style="color:var(--t2);font-size:10px;">${esc(r.b)}</span></div>
        <div class="pi-sub">${r.u||''}</div>
      </div>
      <div class="pi-right">
        <span class="pi-price">${parseFloat(r.p).toFixed(2)}€</span>
        <a href="${url}" target="_blank" onclick="event.stopPropagation()" class="pi-link">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>
    </div>`;
  }).join('');
}

function selectPrice(i,market,brand,price){
  document.querySelectorAll('.price-item').forEach(el=>el.classList.remove('sel'));
  document.getElementById('pi-'+i)?.classList.add('sel');
  document.getElementById('f-price').value=parseFloat(price).toFixed(2);
  document.getElementById('f-market').value=market;
  if(brand&&!document.getElementById('f-brand').value)
    document.getElementById('f-brand').value=brand;
}

      pendingPhoto=p.photo;
      const img=document.createElement('img');
      img.src=p.photo;img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
      pa.appendChild(img);
    }
    document.getElementById('btn-free').style.display='block';
  } else {
    document.getElementById('btn-free').style.display='none';
  }
  document.getElementById('mbg').classList.add('open');
  setTimeout(()=>document.getElementById('search-inp').focus(),60);
}

function onPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    pendingPhoto=ev.target.result;
    const pa=document.getElementById('photo-area');
    pa.querySelectorAll('img').forEach(i=>i.remove());
    const img=document.createElement('img');
    img.src=pendingPhoto;img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:8px;';
    pa.appendChild(img);
  };
  r.readAsDataURL(file);e.target.value='';
}

function saveProduct(){
  if(!ctx)return;
  const name=document.getElementById('search-inp').value.trim();
  if(!name)return;
  const prod={
    name,
    qty:document.getElementById('f-qty').value.trim(),
    brand:document.getElementById('f-brand').value.trim(),
    price:document.getElementById('f-price').value||'',
    market:document.getElementById('f-market').value.trim(),
    emoji:selectedProduct?.e||document.getElementById('photo-emoji').textContent||'🛒',
    photo:pendingPhoto||null,
    bought:false,
    id:Date.now(),
  };
  if(ctx.prodIdx>=0){
    state[ctx.dayId][ctx.mealId][ctx.prodIdx]={...state[ctx.dayId][ctx.mealId][ctx.prodIdx],...prod};
  } else {
    state[ctx.dayId][ctx.mealId].push(prod);
  }
  closeModal();renderAll();saveState();
}

function deleteCurrentProduct(){
  if(!ctx||ctx.prodIdx<0)return;
  state[ctx.dayId][ctx.mealId].splice(ctx.prodIdx,1);
  closeModal();renderAll();saveState();
}

function toggleBought(dayId,mealId,idx){
  state[dayId][mealId][idx].bought=!state[dayId][mealId][idx].bought;
  renderAll();saveState();
}

function closeModal(){
  document.getElementById('mbg').classList.remove('open');
  document.getElementById('finp-photo').value='';
  pendingPhoto=null;ctx=null;selectedProduct=null;
}

document.getElementById('mbg').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('search-inp').addEventListener('keydown',e=>{if(e.key==='Enter')saveProduct();});

// ── Render ────────────────────────────────────────────────────────
function renderAll(){renderSummary();renderDays();renderGrid();}

function renderSummary(){
  const el=document.getElementById('summary');
  let total=0,bought=0,totalPrice=0;
  DAYS.forEach(d=>MEALS.forEach(m=>{
    const prods=state[d.id]?.[m.id]||[];
    total+=prods.length;
    bought+=prods.filter(p=>p.bought).length;
    prods.forEach(p=>{if(p.price)totalPrice+=parseFloat(p.price)||0;});
  }));
  const dayTotals=DAYS.map(d=>{
    let dp=0;
    MEALS.forEach(m=>(state[d.id]?.[m.id]||[]).forEach(p=>{if(p.price)dp+=parseFloat(p.price)||0;}));
    return `<div class="sum-item"><span class="sum-val" style="font-size:14px;">${dp.toFixed(2)}€</span><span class="sum-lbl">${d.label}</span></div>`;
  }).join('<div class="sum-div"></div>');
  el.innerHTML=`
    <div class="sum-item"><span class="sum-val">${total}</span><span class="sum-lbl">Productos</span></div>
    <div class="sum-div"></div>
    <div class="sum-item"><span class="sum-val">${bought}</span><span class="sum-lbl">Comprados</span></div>
    <div class="sum-div"></div>
    <div class="sum-item"><span class="sum-val">${totalPrice.toFixed(2)}€</span><span class="sum-lbl">Total</span></div>
    <div class="sum-div"></div>
    ${dayTotals}`;
}

function renderDays(){
  const el=document.getElementById('days');
  el.innerHTML=DAYS.map(d=>`<button class="day-tab${d.id===currentDay?' active':''}" onclick="setDay('${d.id}')">${d.label}</button>`).join('');
}

function setDay(id){currentDay=id;renderAll();}

function renderGrid(){
  const el=document.getElementById('grid');
  el.innerHTML=MEALS.map(meal=>{
    const prods=state[currentDay]?.[meal.id]||[];
    const mealTotal=prods.reduce((a,p)=>a+(parseFloat(p.price)||0),0);
    return `<div class="meal-card">
      <div class="meal-hdr">
        <div class="meal-hdr-left">
          <div class="meal-icon" style="background:${meal.color};">${meal.icon}</div>
          <span class="meal-name">${meal.label}</span>
        </div>
        ${mealTotal>0?`<span class="meal-total">${mealTotal.toFixed(2)}€</span>`:''}
      </div>
      <div class="products">
        ${prods.length===0?`<div style="padding:10px 6px;font-size:11px;color:var(--t3);text-align:center;">Sin productos</div>`:''}
        ${prods.map((p,i)=>`
          <div class="product${p.bought?' bought':''}">
            <div class="prod-img">${p.photo?`<img src="${p.photo}" alt="">`:(p.emoji||'🛒')}</div>
            <div class="prod-info">
              <div class="prod-name">${esc(p.name)}</div>
              <div class="prod-meta">
                ${p.qty?`<span class="tag tag-qty">${esc(p.qty)}</span>`:''}
                ${p.brand?`<span class="tag tag-brand">${esc(p.brand)}</span>`:''}
                ${p.price?`<span class="tag tag-price">${parseFloat(p.price).toFixed(2)}€</span>`:''}
                ${p.market?`<span class="tag tag-market">${esc(p.market)}</span>`:''}
              </div>
            </div>
            <div class="prod-actions">
              <button class="bico check" onclick="toggleBought('${currentDay}','${meal.id}',${i})" title="Comprado">✓</button>
              <button class="bico" onclick="openModal('${currentDay}','${meal.id}',${i})" title="Editar">✏️</button>
            </div>
            ${p.bought?'<div class="bought-line"></div>':''}
          </div>`).join('')}
        <button class="btn-add" onclick="openModal('${currentDay}','${meal.id}')">＋ Añadir producto</button>
      </div>
    </div>`;
  }).join('');
}

// ── Export ────────────────────────────────────────────────────────
function exportList(){
  let txt='LISTA DE LA COMPRA\n'+'='.repeat(30)+'\n\n';
  DAYS.forEach(d=>{
    txt+=`📅 ${d.label}\n${'-'.repeat(20)}\n`;
    MEALS.forEach(m=>{
      const prods=state[d.id]?.[m.id]||[];
      if(!prods.length)return;
      txt+=`\n${m.icon} ${m.label}\n`;
      prods.forEach(p=>{
        txt+=`  ${p.bought?'✓':'○'} ${p.name}`;
        if(p.qty)txt+=` · ${p.qty}`;
        if(p.brand)txt+=` · ${p.brand}`;
        if(p.price)txt+=` · ${parseFloat(p.price).toFixed(2)}€`;
        if(p.market)txt+=` (${p.market})`;
        txt+='\n';
      });
    });
    txt+='\n';
  });
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='lista_compra.txt';
  a.click();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Init ──────────────────────────────────────────────────────────
loadState();
renderAll();
</script>
</body>
</html>
